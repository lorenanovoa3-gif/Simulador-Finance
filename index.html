<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTURO DEL DINERO CON LA IA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

<h1>🚀 FUTURO DEL DINERO CON LA IA</h1>

<div class="robot">🤖</div>

<div class="card">
<input id="ingresos" type="number" placeholder="💰 Ingresos (COP)">
<input id="fijos" type="number" placeholder="📉 Gastos fijos">
<input id="variables" type="number" placeholder="📊 Gastos variables">

<select id="meta"></select>

<input id="costo" type="number" placeholder="🎯 Costo meta">

<button onclick="calcular()">Calcular Plan IA</button>
</div>

<div class="card" id="resultado"></div>

<div class="counter" id="contador"></div>

<img id="imagenMeta" class="imagenMeta">

<canvas id="grafico"></canvas>

<button onclick="descargarPDF()">📄 Descargar PDF</button>

</div>

<script src="app.js"></script>

</body>
</html>
